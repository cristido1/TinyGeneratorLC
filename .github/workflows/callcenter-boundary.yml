name: CallCenter Boundary Guardrail

on:
  push:
    paths:
      - "Code/Commands/**"
      - "Code/Services/**"
      - "scripts/check_callcenter_boundary.ps1"
      - "scripts/check_command_deterministic_boundary.ps1"
      - ".github/workflows/callcenter-boundary.yml"
  pull_request:
    paths:
      - "Code/Commands/**"
      - "Code/Services/**"
      - "scripts/check_callcenter_boundary.ps1"
      - "scripts/check_command_deterministic_boundary.ps1"
      - ".github/workflows/callcenter-boundary.yml"
  workflow_dispatch:

jobs:
  check-callcenter-boundary:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ripgrep
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep
          which rg
          rg --version

      - name: Verify ripgrep in PowerShell
        shell: pwsh
        run: |
          Get-Command rg | Format-List *
          rg --version

      - name: Run CallCenter boundary check
        shell: pwsh
        run: ./scripts/check_callcenter_boundary.ps1

      - name: Run command deterministic boundary check
        shell: pwsh
        run: ./scripts/check_command_deterministic_boundary.ps1
